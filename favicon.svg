<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="5" fill="#0c0a08"/>

  <!-- lens fill — subtle warm tint -->
  <circle cx="12" cy="12" r="8.2" fill="rgba(200,169,110,0.07)"/>

  <!-- outer lens ring -->
  <circle cx="12" cy="12" r="8.2" fill="none" stroke="#c8a96e" stroke-width="1.8"/>

  <!-- steam wisps rising from cup -->
  <path d="M 10.0,8.6 Q 9.4,7.2 10.2,6.0" fill="none" stroke="rgba(200,169,110,0.52)" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M 12.4,8.2 Q 11.8,6.8 12.6,5.6" fill="none" stroke="rgba(200,169,110,0.52)" stroke-width="0.9" stroke-linecap="round"/>

  <!-- cup body (tapered trapezoid) -->
  <path d="M 7.8,9.4 L 15.6,9.4 L 14.6,16.2 L 8.8,16.2 Z"
        fill="rgba(200,169,110,0.13)" stroke="#c8a96e" stroke-width="1.0" stroke-linejoin="round"/>

  <!-- cup handle (D-curve on the right) -->
  <path d="M 14.6,11.0 C 18.0,11.0 18.0,14.8 14.6,14.8"
        fill="none" stroke="#c8a96e" stroke-width="1.0" stroke-linecap="round"/>

  <!-- saucer line -->
  <line x1="7.0" y1="16.8" x2="16.6" y2="16.8" stroke="#c8a96e" stroke-width="0.9" stroke-linecap="round"/>

  <!-- magnifying glass handle (stick) -->
  <line x1="18.6" y1="18.6" x2="27.0" y2="27.0" stroke="#c8a96e" stroke-width="3.0" stroke-linecap="round"/>

  <!-- handle grip notch -->
  <line x1="21.0" y1="21.0" x2="22.5" y2="22.5" stroke="rgba(200,169,110,0.38)" stroke-width="1.4" stroke-linecap="round"/>
</svg>
