<!DOCTYPE html>
<html>

<head>
    <title>NFC 智能展示</title>
    <style>
        body {
            font-family: '微软雅黑';
            text-align: center;
            transition: 0.5s;
            margin-top: 100px;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        p {
            font-size: 1.2em;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="box">
        <h1 id="name">等待物品扫描...</h1>
        <p id="info">请将 NFC 标签靠近读卡器</p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('show_info', (data) => {
            document.getElementById('name').innerText = data.name;
            document.getElementById('info').innerText = data.info;
            document.body.style.backgroundColor = data.color;
        });
    </script>
</body>

</html>
