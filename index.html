<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Last Witness</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<!-- This is xiao testing to commit 500000th time -->
<body>

    <div class="fade-overlay" id="fadeOverlay"></div>
    <div class="scan-flash" id="scanFlash"></div>

    <!-- MEMORY OVERLAY — triggered by NFC scan -->
    <div class="memory-overlay hidden" id="memoryOverlay">
        <img class="memory-overlay-image" id="memoryOverlayImage" src="" alt="">
        <button class="memory-overlay-close" onclick="closeMemoryOverlay()">✕</button>
        <div class="memory-overlay-content" onclick="advanceMemoryOverlay()">
            <div class="memory-overlay-time" id="memoryOverlayTime"></div>
            <div class="memory-overlay-lines" id="memoryOverlayLines"></div>
            <span class="memory-overlay-hint" id="memoryOverlayHint"></span>
        </div>
    </div>

    <!-- ══════════════════════════════════════════════
         DEV PANEL — simulate NFC scans without hardware
    ══════════════════════════════════════════════ -->
    <!--<div class="dev-panel" id="devPanel">
        <div class="dev-panel-label">DEV · Scan Object</div>
        <button onclick="devScan('53C19186520001')">🚇 metro card</button>
        <button onclick="devScan('53AC8C86520001')">📛 barista pin</button>
        <button onclick="devScan('53B28486520001')">☕ coffee cup</button>
        <button onclick="devScan('53A36287520001')">🧾 Rent Paper</button>
        <button onclick="devScan('53C97A86520001')">🎵 AirPod</button>
    </div> -->

    <!--01 · INTRO — Title card-->
    <div class="scene active" id="scene-intro">
        <div class="scene-bg"></div>
        <div class="intro-content">
            <div class="game-eyebrow">An Interactive Investigation</div>
            <h1 class="game-title">The Last<br>Witness</h1>
            <button class="start-btn" onclick="goToIntroduction()">Enter</button>
        </div>
    </div>

    <!--02 · INTRODUCTION — Background + how to play-->
    <div class="scene" id="scene-introduction">
        <div class="scene-bg"></div>
        <div class="introduction-body">
            <div class="introduction-page" id="introductionPage">
                <div class="introduction-page-num" id="introductionNum">01 / 03</div>
                <h2 class="introduction-title" id="introductionTitle"></h2>
                <p class="introduction-text" id="introductionText"></p>
                <div class="introduction-nav introduction-nav-first-only" id="introductionNav"
                    role="group" aria-label="Introduction pages">
                    <button type="button"
                        class="introduction-nav-btn introduction-nav-prev hidden"
                        id="introductionPrev" onclick="introductionGoPrev()"
                        aria-label="Back">← Back</button>
                    <button type="button" class="introduction-nav-btn introduction-nav-next"
                        id="introductionNext" onclick="introductionGoNext()"
                        aria-label="Continue">Continue →</button>
                </div>
            </div>
        </div>
    </div>

    <!--03 · WHITE ROOM — Main investigation-->
    <div class="scene" id="scene-investigation">
        <div class="scene-bg"></div>
        <div class="investigation-ui">

            <div class="top-bar">
                <div>
                    <div class="location-label">Location &nbsp;·&nbsp; The White Room</div>
                    <div class="case-name">The Last Witness</div>
                </div>
                <div class="top-bar-right">
                    <button class="case-file-btn" id="caseFileBtn" onclick="toggleCaseFile()">
                        Case File
                    </button>
                    <div class="conn-status">
                        <span class="conn-dot" id="connDot"></span>
                        <span class="conn-text" id="connText">offline</span>
                    </div>
                </div>
            </div>

            <div class="inv-spacer"></div>

            <div id="invDialogue" class="inv-dialogue hidden">
                <div class="dialogue-panel" id="invPanel">
                    <div class="dialogue-speaker" id="invSpeaker"></div>
                    <div class="dialogue-text" id="invText"></div>
                    <div id="invChoiceWrap" class="inv-choice-wrap hidden" aria-live="polite"></div>
                    <span class="dialogue-hint" id="invHint">
                        Click anywhere or press Space ›
                    </span>
                </div>
            </div>

        </div>
    </div>

    <!-- 04 · CHOICE — Final decision -->
    <div class="scene" id="scene-choice">
        <div class="scene-bg"></div>
        <div class="choice-content">
            <div class="choice-eyebrow">The question is waiting.</div>
            <div class="choice-question">
                The person who fell —<br>did you know who they were?
            </div>
            <div class="choice-buttons">
                <button class="choice-btn comply" onclick="chooseEnding('comply')">
                    Yes. I recognised them.
                </button>
                <button class="choice-btn resist" onclick="chooseEnding('resist')">
                    I can't be certain.
                </button>
            </div>
            <div class="choice-subtext">This choice cannot be undone</div>
        </div>
    </div>

    <!-- 05a · ENDING A — Comply -->
    <div class="scene" id="scene-ending-comply">
        <div class="scene-bg"></div>
        <div class="ending-content">
            <div class="ending-testimony" id="ending-testimony-comply">
                <div class="truth-lines" id="truth-lines-comply"></div>
                <div class="ending-title" id="ending-title-comply"></div>
                <button class="reveal-btn hidden" id="ending-reveal-comply" onclick="revealEnding('comply')">
                    ◈&nbsp;&nbsp;Reveal Case Result&nbsp;&nbsp;◈
                </button>
            </div>
            <div class="ending-report" id="ending-report-comply"></div>
        </div>
    </div>

    <!-- 05b · ENDING B — Resist -->
    <div class="scene" id="scene-ending-resist">
        <div class="scene-bg"></div>
        <div class="ending-content">
            <div class="ending-testimony" id="ending-testimony-resist">
                <div class="truth-lines" id="truth-lines-resist"></div>
                <div class="ending-title" id="ending-title-resist"></div>
                <button class="reveal-btn hidden" id="ending-reveal-resist" onclick="revealEnding('resist')">
                    ◈&nbsp;&nbsp;Reveal Case Result&nbsp;&nbsp;◈
                </button>
            </div>
            <div class="ending-report" id="ending-report-resist"></div>
        </div>
    </div>

    <div class="case-file-modal hidden" id="caseFileModal" onclick="closeCaseFile()">
        <div class="case-file-panel" id="caseFilePanel" onclick="event.stopPropagation()">
            <div class="case-file-list" id="caseFileList">
            </div>
        </div>
    </div>

    <script>
    function loadGame() {
        if (typeof init !== 'undefined') return; // 防止重复加载
        var g = document.createElement('script');
        g.src = 'game.js';
        document.body.appendChild(g);
    }

    var sio = document.createElement('script');
    sio.src = '/socket.io/socket.io.js';
    sio.onload = loadGame;
    sio.onerror = loadGame;
    document.head.appendChild(sio);

    setTimeout(loadGame, 2000); // 保险，2秒后强制加载
</script>
</body>

</html>
